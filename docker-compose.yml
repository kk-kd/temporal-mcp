services:
  # MCP server - connects to an external Temporal server
  # For local development, run Temporal separately or use docker-compose.local.yml
  temporal-mcp:
    build: .
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-host.docker.internal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      # For Temporal Cloud with mTLS, uncomment and set:
      # - TEMPORAL_TLS_CERT=/certs/client.pem
      # - TEMPORAL_TLS_KEY=/certs/client.key
      # Or use API key authentication:
      # - TEMPORAL_API_KEY=${TEMPORAL_API_KEY}
    # volumes:
    #   - ./certs:/certs:ro  # Mount certificates for Temporal Cloud
    stdin_open: true
    tty: true
